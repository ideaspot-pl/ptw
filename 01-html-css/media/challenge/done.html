<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Media Challenge</title>
  </head>
  <body>
    <img
      src="../../resources/circles.jpg"
      style="
        width: 60%;
        position: absolute;
        top: 0;
        left: 0;
      "
    />
    <video
      src="../../resources/waterfalls.mp4"
      controls
      muted
      poster="../../resources/stones.jpg"
      loop
      style="
        width: 60%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(-4deg);
        z-index: 2;
      "
    ></video>
    <img src="../../resources/rail.jpg"
         style="
        width: 60%;
        position: absolute;
        right: 0;
        bottom: 0;
      "
    />
  </body>
</html>
