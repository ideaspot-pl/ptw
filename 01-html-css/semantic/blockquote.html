<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blockquote</title>

    <style>
      blockquote {
        font-style: italic;
        margin-left: 20px;
        border-left: 4px solid #ccc;
        padding-left: 10px;
      }
    </style>
  </head>
  <body>
    <blockquote>
      <p>
          People say nothing is impossible, 
          but I do nothing every day.
      </p>
    </blockquote>
    <p>— Winnie-the-Pooh (A. A. Milne)</p>
  </body>
</html>
