<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jinja Example</title>
</head>
<body>

{% if name %}
    <h1>Hello {{ name }}!</h1>
{% else %}
    <h1>Hello World!</h1>
{% endif %}

{# some comment #}

{% for fruit in fruits %}
    <p>{{ fruit }}</p>
{% endfor %}

</body>
</html>
